<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barátság, szeretet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
  h1 { color: #7F77DD; font-size: 18px; font-weight: 500; margin-bottom: 10px; letter-spacing: 1px; }
  #gw { width: 680px; max-width: 100%; background: #080610; border-radius: 12px; overflow: hidden; position: relative; user-select: none; }
  canvas { display: block; width: 100%; }
  #ov {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,4,12,0.95); flex-direction: column; gap: 14px;
  }
  #ov h2 { color: #fff; font-size: 22px; font-weight: 500; }
  #ov p { color: #aaa; font-size: 14px; text-align: center; max-width: 380px; line-height: 1.7; }
  .sbtn { padding: 11px 32px; border-radius: 8px; border: none; background: #7F77DD; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
  .sbtn:hover { background: #534AB7; }
  .key { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 5px; padding: 3px 9px; font-size: 13px; color: #fff; font-family: monospace; }
  .ctrl { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .ctrl-box { text-align: center; }
  .ctrl-box p { font-weight: 500; margin-bottom: 6px; }
  #credits { color: #333; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<h1> Murophral Quest</h1>
<div id="gw">
  <canvas id="gc" height="500"></canvas>
  <div id="ov">
    <h2>NIGHTMARE LEVELS</h2>
    <p>El kell érnetek a végét.<br>Ha bárki meghal, mindketten visszamentek a startra, mert ilyen a barátság.<br> Szeretet.</p>
    <div class="ctrl">
      <div class="ctrl-box">
        <p style="color:#D85A30">Piros</p>
        <span class="key">A</span> <span class="key">D</span> <span class="key">W</span>
      </div>
      <div class="ctrl-box">
        <p style="color:#378ADD">Kék</p>
        <span class="key">←</span> <span class="key">→</span> <span class="key">↑</span>
      </div>
    </div>
    <button class="sbtn" onclick="startGame()">Indítás</button>
  </div>
</div>


<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 680, H = 500;
canvas.width = W; canvas.height = H;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','a','d','W','A','D'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let gameRunning = false, won = false, frameId = null;
let players, platforms, movingPlatforms, spikes, goal, particles, cameraX, deaths;

const GRAV = 0.62, SPEED = 3.1, JUMP = -12.8, FRIC = 0.76;
const LW = 4200;

function startGame() {
  document.getElementById('ov').style.display = 'none';
  build(); won = false; gameRunning = true; cameraX = 0;
  if (!deaths) deaths = 0;
  if (frameId) cancelAnimationFrame(frameId);
  loop();
}

    {x:3720,y:180, w:30, h:12, col:'#3B6D11', ox:3720,oy:180, range:80,  speed:2.5, dir:-1, axis:'x'},

    {x:1700,y:160, w:34, h:12, col:'#7F77DD', ox:1700,oy:160, range:110, speed:1.6, dir:-1, axis:'y'},
    {x:2560,y:150, w:32, h:12, col:'#7F77DD', ox:2560,oy:150, range:120, speed:1.8, dir:1,  axis:'y'},

  spikes = [
    {x:120, y:447,w:70, h:10},{x:240, y:447,w:50, h:10},

    {x:3150,y:447,w:90, h:10},{x:3280,y:447,w:60, h:10},

    {x:3920,y:447,w:90, h:10},{x:4050,y:447,w:30, h:10},
    {x:195, y:411,w:45, h:8}, {x:295, y:376,w:38, h:8},
    {x:395, y:341,w:36, h:8}, {x:505, y:301,w:34, h:8},
    {x:615, y:261,w:32, h:8}, {x:725, y:321,w:34, h:8},
    {x:835, y:281,w:32, h:8}, {x:1105,y:381,w:34, h:8},
    {x:1215,y:331,w:32, h:8}, {x:1325,y:286,w:32, h:8},
    {x:1435,y:331,w:34, h:8}, {x:1565,y:381,w:32, h:8},
    {x:1835,y:391,w:32, h:8}, {x:1945,y:341,w:30, h:8},
    {x:2065,y:291,w:30, h:8}, {x:2185,y:251,w:30, h:8},
    {x:2315,y:301,w:30, h:8}, {x:2435,y:351,w:30, h:8},
    {x:2705,y:381,w:30, h:8}, {x:2825,y:321,w:30, h:8},
    {x:2955,y:271,w:28, h:8}, {x:3085,y:321,w:28, h:8},
    {x:3215,y:371,w:28, h:8}, {x:3475,y:381,w:28, h:8},
    {x:3595,y:321,w:28, h:8}, {x:3725,y:271,w:28, h:8},

  ];

  goal = {x:4105, y:255, w:55, h:65, p0:false, p1:false};

  players = [
    {x:20, y:415, w:22, h:30, vx:0, vy:0, onGround:false, col:'#D85A30', hat:'#FF7050', facing:1, anim:0, jumped:false, id:0},
    {x:55, y:415, w:22, h:30, vx:0, vy:0, onGround:false, col:'#378ADD', hat:'#5BA8F5', facing:1, anim:0, jumped:false, id:1},
  ];
  particles = [];
}

function loop() {
  if (!gameRunning) return;
  update(); draw();
  frameId = requestAnimationFrame(loop);
}

function update() {
  if (won) return;

  for (const mp of movingPlatforms) {
    if (mp.axis === 'x') {
      mp.x += mp.speed * mp.dir;
      if (mp.x > mp.ox + mp.range || mp.x < mp.ox - mp.range) mp.dir *= -1;
    } else {
      mp.y += mp.speed * mp.dir;
      if (mp.y > mp.oy + mp.range || mp.y < mp.oy - mp.range) mp.dir *= -1;
    }
  }

  const ctrls = [
    {left: keys['a']||keys['A'], right: keys['d']||keys['D'], jump: keys['w']||keys['W']},
    {left: keys['ArrowLeft'],    right: keys['ArrowRight'],    jump: keys['ArrowUp']},
  ];

  const invincible = keys['g']||keys['G'];
  let anyDead = false;
  for (let i = 0; i < 2; i++) {
    const p = players[i], c = ctrls[i];
    if (c.left)  { p.vx -= 0.9; p.facing = -1; }
    if (c.right) { p.vx += 0.9; p.facing =  1; }
    if (!c.left && !c.right) p.vx *= FRIC;
    p.vx = Math.max(-SPEED, Math.min(SPEED, p.vx));

    if (c.jump && p.onGround && !p.jumped) {
      p.vy = JUMP; p.onGround = false; p.jumped = true;
      spawnP(p.x + p.w/2, p.y + p.h, p.col, 5);
    }
    if (!c.jump) p.jumped = false;

    p.vy += GRAV;
    p.x += p.vx;
    p.y += p.vy;

    if (invincible) {
      p.vy = 0;
      if (p.x + p.w > goal.x && p.x < goal.x + goal.w) {
        p.y = goal.y - p.h;
        p.onGround = true;
      } else {
        p.onGround = true;
       const baseline = 415;
        if (p.y > baseline) p.y = baseline;
      }
    }

    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x + p.w > LW) { p.x = LW - p.w; p.vx = 0; }
    if (p.y > H + 80) { if (!invincible) { anyDead = true; break; } }

    p.onGround = false;
    for (const pl of [...platforms, ...movingPlatforms]) {
      if (p.x+p.w > pl.x && p.x < pl.x+pl.w &&
          p.y+p.h > pl.y && p.y+p.h < pl.y+pl.h+14 && p.vy >= 0) {
        p.y = pl.y - p.h; p.vy = 0; p.onGround = true;
      }
    }

    for (const sp of spikes) {
      if (p.x+p.w > sp.x+2 && p.x < sp.x+sp.w-2 &&
          p.y+p.h > sp.y+2 && p.y < sp.y+sp.h) {
        if (!invincible) { anyDead = true; break; }
      }
    }

    if (!goal['p'+i] &&
        p.x+p.w > goal.x && p.x < goal.x+goal.w &&
        p.y+p.h > goal.y && p.y < goal.y+goal.h) {
      goal['p'+i] = true;
      spawnP(goal.x+goal.w/2, goal.y+goal.h/2, '#FFD700', 25);
    }
    if (goal.p0 && goal.p1) { won = true; setTimeout(showWin, 700); }

    p.anim = (p.anim + (Math.abs(p.vx) > 0.3 ? 0.22 : 0)) % (Math.PI*2);
  }

  if (anyDead) {
    deaths++;
    for (const p of players) {
      spawnP(p.x+p.w/2, p.y+p.h/2, p.col, 18);
      p.x = p.id===0 ? 20 : 55; p.y = 415; p.vx = 0; p.vy = 0;
    }
    goal.p0 = false; goal.p1 = false;
  }

  const avgX = (players[0].x + players[1].x) / 2;
  cameraX += (avgX - W/2 - cameraX) * 0.09;
  cameraX = Math.max(0, Math.min(LW - W, cameraX));

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 2;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function showWin() {
  gameRunning = false;
  const ol = document.getElementById('ov');
  ol.style.display = 'flex';
  ol.innerHTML = `
    
    <h2 style="color:#FFD700">Megvan a vége!</h2>
    <p style="color:#ccc">Halálok száma: <strong style="color:#D85A30;font-size:20px">${deaths}</strong></p>
    <button class="sbtn" onclick="deaths=0;startGame()">Újra (0-tól)</button>
  `;
}

function spawnP(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*4;
    particles.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:60+Math.random()*40, color});
  }
}

function rr(x, y, w, h, r, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||1.5; ctx.stroke(); }
}

function drawSpike(x, y, w, h) {
  const n = Math.floor(w/10);
  ctx.fillStyle = '#E24B4A';
  for (let i = 0; i < n; i++) {
    const sx = x + i*10;
    ctx.beginPath();
    ctx.moveTo(sx, y+h); ctx.lineTo(sx+5, y); ctx.lineTo(sx+10, y+h);
    ctx.closePath(); ctx.fill();
  }
}

function drawPlayer(p) {
  const x = Math.round(p.x - cameraX), y = Math.round(p.y);
  const ls = Math.sin(p.anim) * 5;
  ctx.fillStyle = p.col;
  ctx.fillRect(x+4, y+18, 6, 12+ls);
  ctx.fillRect(x+12, y+18, 6, 12-ls);
  rr(x+2, y+6, 18, 18, 4, '#f5cba7', null);
  ctx.fillStyle = p.col; ctx.fillRect(x, y+6, 22, 10);
  ctx.fillStyle = p.hat; rr(x+1, y, 20, 8, 3, p.hat, null);
  ctx.fillRect(x-2, y+6, 26, 5);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(p.facing > 0 ? x+13 : x+6, y+11, 3, 3);
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(x-3, y+10, 5, 8);
  ctx.fillRect(x+20, y+10, 5, 8);
}

function drawGoal() {
  const gx = goal.x - cameraX, gy = goal.y;
  rr(gx, gy+20, 55, 45, 4, '#3a2a1a', null);
  ctx.strokeStyle = '#8B5E3C'; ctx.lineWidth = 2;
  ctx.strokeRect(gx, gy+20, 55, 45);
  
  
  
  const bob = Math.sin(Date.now()*0.003)*3;
  ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,220,50,0.9)';
  ctx.fillText('!', gx+27, gy-5+bob);
  ctx.font = '11px sans-serif';
  ctx.fillStyle = goal.p0 ? '#D85A30' : 'rgba(255,255,255,0.25)'; ctx.fillText('P', gx+16, gy+16);
  ctx.fillStyle = goal.p1 ? '#378ADD' : 'rgba(255,255,255,0.25)'; ctx.fillText('K', gx+38, gy+16);
}

function draw() {
  ctx.fillStyle = '#080610'; ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 12; i++) {
    const sx = ((i*183 - cameraX*0.012) % W + W) % W;
    ctx.fillStyle = `rgba(255,255,255,${0.005+i*0.002})`;
    ctx.fillRect(sx, 0, 1, H);
  }

  for (const pl of platforms) {
    const px = pl.x - cameraX;
    if (px+pl.w < 0 || px > W) continue;
    rr(px, pl.y, pl.w, pl.h, 4, pl.col, 'rgba(255,255,255,0.1)', 0.5);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(px+4, pl.y+2, pl.w-8, 3);
  }

  for (const mp of movingPlatforms) {
    const px = mp.x - cameraX;
    if (px+mp.w < 0 || px > W) continue;
    rr(px, mp.y, mp.w, mp.h, 4, mp.col, 'rgba(255,180,0,0.5)', 1);
    ctx.fillStyle = 'rgba(255,180,0,0.12)';
    ctx.fillRect(px+3, mp.y+2, mp.w-6, 3);
  }

  for (const sp of spikes) {
    const sx = sp.x - cameraX;
    if (sx+sp.w < 0 || sx > W) continue;
    drawSpike(sx, sp.y, sp.w, sp.h);
  }

  drawGoal();

  for (const pt of particles) {
    ctx.globalAlpha = pt.life/100;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - cameraX - 2, pt.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  for (const p of players) drawPlayer(p);

  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, 26);
  ctx.font = '13px sans-serif';
  ctx.fillStyle = players[0].col; ctx.textAlign = 'left';
  ctx.fillText('Piros  A / D / W', 10, 17);
  ctx.fillStyle = players[1].col; ctx.textAlign = 'right';
  ctx.fillText('Kék  ← / → / ↑', W-10, 17);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,80,80,0.95)';
  ctx.fillText('Halálok: ' + deaths, W/2, 17);

  const prog = Math.min(1, ((players[0].x + players[1].x)/2) / LW);
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(0, H-5, W, 5);
  ctx.fillStyle = '#7F77DD'; ctx.fillRect(0, H-5, W*prog, 5);
}

draw();
</script>
